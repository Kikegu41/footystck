<article class="card">
  <div class="imagen">
    <img [src]="camiseta.imagen_url" [alt]="camiseta.nombre" />
    <span class="badge temporada">{{ camiseta.temporada }}</span>
  </div>

  <div class="info">
    <h3>{{ camiseta.equipo_nombre || camiseta.nombre }}</h3>
    <p class="sub">Camiseta {{ camiseta.tipo }} {{ camiseta.temporada }}</p>
    <p class="precio">{{ camiseta.precio }} €</p>
    <button class="btn btn-azul" (click)="abierto = true">Personalizar</button>
  </div>
</article>

<app-personalizacion-dialog *ngIf="abierto" [camiseta]="camiseta" (cerrar)="abierto = false"></app-personalizacion-dialog>

<style>
  .card {
    background: #fff;
    border: 1px solid var(--gris-borde);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .imagen { position: relative; aspect-ratio: 4/5; background: #f1f5f9; }
  .imagen img { width: 100%; height: 100%; object-fit: cover; }
  .badge {
    position: absolute; top: 10px; left: 10px;
    color: #fff; font-size: 0.7rem; font-weight: 700;
    padding: 0.2rem 0.55rem; border-radius: 999px;
  }
  .badge.temporada { background: var(--verde); }
  .info { padding: 0.9rem 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.25rem; }
  .info h3 { margin: 0; font-size: 1.05rem; }
  .sub { margin: 0; color: var(--gris-texto); font-size: 0.85rem; }
  .precio { margin: 0.4rem 0 0.7rem; color: var(--azul); font-weight: 700; font-size: 1.15rem; }
</style>
