<header class="cabecera">
  <div class="contenedor barra">
    <a routerLink="/" class="logo">
      <span class="pelota">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <circle cx="12" cy="12" r="9" fill="#fff"/>
          <path d="M12 7.2l2.5 1.8-1 3h-3l-1-3z" fill="#0f172a"/>
          <path d="M12 7.2V4.2M14.5 9l2.4-1M9.5 9L7.1 8M10.5 12.2L9 14.6M13.5 12.2L15 14.6" stroke="#0f172a" stroke-width="0.8" fill="none"/>
        </svg>
      </span>
      <span class="marca">
        <strong>FootyStck</strong>
        <small>Pasión por las Camisetas</small>
      </span>
    </a>

    <nav class="nav">
      <button class="cat-btn" (click)="ui.alternar()">
        <svg viewBox="0 0 16 16" width="15" height="15"><path d="M1 3h14M1 8h14M1 13h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Categorías
      </button>
      <a routerLink="/">Inicio</a>
      <a routerLink="/mis-pedidos" *ngIf="auth.usuario">Mis pedidos</a>
      <a routerLink="/admin" *ngIf="auth.esAdmin()">Admin</a>

      <button class="tema" (click)="ui.alternarTema()" [title]="ui.oscuro ? 'Modo claro' : 'Modo oscuro'">
        <svg *ngIf="!ui.oscuro" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg *ngIf="ui.oscuro" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>
      </button>

      <a routerLink="/carrito" class="carrito" title="Carrito">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="20" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="18" cy="20" r="1.3" fill="currentColor" stroke="none"/>
          <path d="M1 1h3l2.6 13a1.5 1.5 0 0 0 1.5 1.2h9.1a1.5 1.5 0 0 0 1.5-1.2L21 5H5.2"/>
        </svg>
        <span class="contador" *ngIf="carrito.cantidadTotal() > 0">{{ carrito.cantidadTotal() }}</span>
      </a>

      <span class="usuario" *ngIf="auth.usuario">Hola, {{ auth.usuario.nombre }}</span>
      <button class="btn btn-claro" *ngIf="auth.usuario" (click)="auth.logout()">Salir</button>
      <a routerLink="/login" class="btn btn-marino" *ngIf="!auth.usuario">Entrar</a>
    </nav>
  </div>
</header>

<style>
  .cabecera { background: var(--tarjeta); border-bottom: 1px solid var(--gris-borde); position: sticky; top: 0; z-index: 10; }
  .barra { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: center; gap: 0.6rem; }
  .pelota {
    background: var(--verde); width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center; border-radius: 50%;
  }
  .marca { display: flex; flex-direction: column; line-height: 1.1; }
  .marca strong { font-size: 1.1rem; }
  .marca small { color: var(--gris-texto); font-size: 0.7rem; }
  .nav { display: flex; align-items: center; gap: 1.1rem; }
  .nav a { font-weight: 500; }
  .cat-btn { display: inline-flex; align-items: center; gap: 0.4rem; border: 1px solid var(--gris-borde); background: var(--tarjeta); color: var(--texto); border-radius: 8px; padding: 0.45rem 0.8rem; cursor: pointer; font-weight: 600; }
  .cat-btn:hover { background: var(--fondo-suave); }
  .tema { display: inline-flex; align-items: center; border: none; background: none; cursor: pointer; color: var(--gris-texto); padding: 0.2rem; }
  .tema:hover { color: var(--texto); }
  .carrito { position: relative; display: inline-flex; color: var(--texto); }
  .contador {
    position: absolute; top: -8px; right: -10px;
    background: var(--azul); color: #fff; font-size: 0.7rem; font-weight: 700;
    border-radius: 999px; padding: 0 0.35rem; min-width: 18px; text-align: center;
  }
  .usuario { color: var(--gris-texto); font-size: 0.9rem; }
</style>
