server.port=8080

# --- Base de datos MySQL (visible en MySQL Workbench) ---
# createDatabaseIfNotExist crea la BD 'footystck' sola si todavia no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/footystck?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# create = recrea las tablas y vuelve a cargar data.sql en cada arranque (arranca siempre limpio).
# Si quieres que los datos creados sobrevivan a los reinicios: cambia a 'update'
# y pon mas abajo spring.sql.init.mode=never (despues del primer arranque).
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ejecuta data.sql DESPUES de que JPA cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# El JSON usa snake_case (imagen_url, equipo_nombre...) para encajar con el frontend
spring.jackson.property-naming-strategy=SNAKE_CASE

